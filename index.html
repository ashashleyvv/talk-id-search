  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #646b75;
      --border: #d8dee7;
      --focus: #0b63ce;
      --kakao: #fee500;
      --kakao-hover: #f4d900;
      --danger: #d92d20;
      --success-bg: #eef6ff;
      --success-border: #b8d7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      background: var(--bg);
      color: var(--text);
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    main {
      width: min(100%, 560px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(31, 35, 40, 0.08);
      padding: 34px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(24px, 4vw, 32px);
      line-height: 1.28;
      letter-spacing: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    input {
      width: 100%;
      min-width: 0;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(11, 99, 206, 0.16);
    }

    button {
      min-width: 88px;
      height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 6px;
      background: var(--kakao);
      color: #222222;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
    }

    button:hover {
      background: var(--kakao-hover);
    }

    button.secondary {
      min-width: 72px;
      background: #1f2328;
      color: #ffffff;
    }

    button.secondary:hover {
      background: #3a4048;
    }

    #result {
      min-height: 76px;
      margin-top: 22px;
      padding: 18px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      background: #fafbfc;
      font-size: 15px;
      line-height: 1.55;
    }

    #result.success {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      border-color: var(--success-border);
      color: var(--text);
      background: var(--success-bg);
    }

    #result.error {
      border-color: #f6b9b3;
      color: var(--danger);
      background: #fff5f4;
      font-weight: 700;
    }

    .result-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .result-id {
      display: block;
      overflow-wrap: anywhere;
      color: var(--focus);
      font-size: 28px;
      font-weight: 850;
      line-height: 1.2;
    }

    .meta {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 520px) {
      body {
        align-items: start;
        padding-top: 24px;
      }

      main {
        padding: 24px;
      }

      .search-row,
      #result.success {
        grid-template-columns: 1fr;
      }

      button,
      button.secondary {
        width: 100%;
      }
    }
  </style>
</head>

    const input = document.getElementById("domainInput");
    const searchButton = document.getElementById("searchButton");
    const result = document.getElementById("result");

    let currentId = "";

    function normalizeDomain(value) {
      return value
        .trim()
        .toLowerCase()
        .replace(/^https?:\/\//, "")
        .replace(/^www\./, "")
        .split(/[/?#]/)[0]
        .trim();
    }

    function setIdle() {
      result.className = "";
      result.textContent = "도메인을 입력하면 톡채널 ID가 표시됩니다.";
      currentId = "";
    }

    function setError(message) {
      result.className = "error";
      result.textContent = message;
      currentId = "";
    }

    function setSuccess(domain, talkChannelId) {
      currentId = talkChannelId;
      result.className = "success";
      result.innerHTML = "";

      const text = document.createElement("div");
      const label = document.createElement("span");
      const id = document.createElement("span");
      const copyButton = document.createElement("button");

      label.className = "result-label";
      label.textContent = domain + " 톡채널 ID";
      id.className = "result-id";
      id.textContent = talkChannelId;
      copyButton.className = "secondary";
      copyButton.type = "button";
      copyButton.textContent = "복사";
      copyButton.addEventListener("click", copyId);

      text.append(label, id);
      result.append(text, copyButton);
    }

    async function copyId() {
      if (!currentId) return;

      try {
        await navigator.clipboard.writeText(currentId);
        const button = result.querySelector("button");
        if (!button) return;
        button.textContent = "완료";
        window.setTimeout(() => {
          button.textContent = "복사";
        }, 1200);
      } catch {
        setError("복사에 실패했습니다. 톡채널 ID를 직접 선택해주세요.");
      }
    }

    function searchId() {
      const rawValue = input.value;
      const domain = normalizeDomain(rawValue);

      if (!domain) {
        setError("도메인 정보를 입력해주세요.");
        return;
      }

      const talkChannelId = talkChannelMap[domain];
      if (!talkChannelId) {
        setError("등록되지 않은 도메인 정보입니다.");
        return;
      }

      setSuccess(domain, talkChannelId);
    }

    searchButton.addEventListener("click", searchId);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        searchId();
      }
    });
    input.addEventListener("input", () => {
      if (!input.value.trim()) setIdle();
    });
